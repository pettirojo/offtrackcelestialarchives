
<style>
  .ca-wrap { padding: 1.5rem 0; font-family: var(--font-sans); }

  .ca-hero h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); letter-spacing: 0.06em; margin: 0 0 6px; }
  .ca-hero p { font-size: 14px; color: var(--color-text-secondary); margin: 0; }
  .ca-search { display: flex; align-items: center; gap: 10px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: 24px; padding: 8px 16px; max-width: 440px; margin: 0 auto 2rem; }
  .ca-search i { font-size: 16px; color: var(--color-text-secondary); flex-shrink: 0; }
  .ca-search input { background: transparent; border: none; outline: none; width: 100%; font-size: 14px; color: var(--color-text-primary); font-family: var(--font-sans); }
  .ca-filters { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 1.5rem; }
  .ca-filter-btn { font-size: 12px; padding: 4px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-secondary); cursor: pointer; font-family: var(--font-sans); transition: all 0.15s; }
  .ca-filter-btn.active, .ca-filter-btn:hover { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
  .ca-sort { display: flex; justify-content: flex-end; margin-bottom: 1rem; gap: 8px; align-items: center; }

  .ca-sort select { font-size: 12px; border-radius: 6px; padding: 4px 8px; }
  .ca-count { font-size: 12px; color: var(--color-text-tertiary); }
  .ca-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 1rem; }
  .ca-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem 1.1rem; cursor: pointer; transition: border-color 0.15s; position: relative; }
  .ca-card:hover { border-color: var(--color-border-primary); }
  .ca-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
  .ca-card-names { flex: 1; min-width: 0; }
  .ca-latin { font-size: 15px; font-weight: 500; color: var(--color-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ca-english { font-size: 12px; color: var(--color-text-secondary); margin-top: 1px; }
  .ca-season-badge { font-size: 11px; padding: 3px 10px; border-radius: 12px; flex-shrink: 0; font-weight: 500; }
  .ca-desc { font-size: 13px; color: var(--color-text-secondary); line-height: 1.6; margin-bottom: 10px; }
  .ca-meta { display: flex; gap: 8px; flex-wrap: wrap; border-top: 0.5px solid var(--color-border-tertiary); padding-top: 10px; }
  .ca-chip { font-size: 11px; padding: 3px 10px; border-radius: 10px; background: var(--color-background-secondary); color: var(--color-text-secondary); display: flex; align-items: center; gap: 4px; }
  .ca-chip i { font-size: 13px; }
  .ca-empty { text-align: center; padding: 3rem; color: var(--color-text-tertiary); font-size: 14px; grid-column: 1 / -1; }
  .season-spring { background: #EAF3DE; color: #3B6D11; }
  .season-summer { background: #FAEEDA; color: #854F0B; }
  .season-autumn { background: #FAECE7; color: #993C1D; }
  .season-winter { background: #E6F1FB; color: #185FA5; }
  .season-all { background: var(--color-background-secondary); color: var(--color-text-secondary); }
  @media (prefers-color-scheme: dark) {
    .season-spring { background: #27500A; color: #C0DD97; }
    .season-summer { background: #633806; color: #FAC775; }
    .season-autumn { background: #712B13; color: #F5C4B3; }
    .season-winter { background: #0C447C; color: #B5D4F4; }
  }
</style>

<div class="ca-wrap">
  <h2 class="sr-only">Celestial Archive — all 88 IAU constellations with descriptions, brightest stars, area, and season.</h2>
  <div class="ca-hero">
    <h1>C E L E S T I A L &nbsp; A R C H I V E</h1>
    <p>All 88 official IAU constellations — names, descriptions, brightest stars &amp; more</p>
  </div>

  <div class="ca-search">
    <i class="ti ti-telescope" aria-hidden="true"></i>
    <input type="text" id="ca-input" placeholder="Search by name, star, hemisphere…" autocomplete="off">
  </div>

  <div class="ca-filters">
    <button class="ca-filter-btn active" data-filter="all">All seasons</button>
    <button class="ca-filter-btn" data-filter="spring">Spring</button>
    <button class="ca-filter-btn" data-filter="summer">Summer</button>
    <button class="ca-filter-btn" data-filter="autumn">Autumn</button>
    <button class="ca-filter-btn" data-filter="winter">Winter</button>
  </div>

  <div class="ca-sort">
    <label for="ca-sort-sel">Sort by</label>
    <select id="ca-sort-sel">
      <option value="alpha">Name A–Z</option>
      <option value="area-desc">Largest first</option>
      <option value="area-asc">Smallest first</option>
    </select>
    <span class="ca-count" id="ca-count"></span>
  </div>

  <div class="ca-grid" id="ca-grid"></div>
</div>

<script>
const DATA = [
  { latin:"Andromeda", english:"Princess of Ethiopia", brightest:"Alpheratz", area:722, season:"autumn", hemi:"N", desc:"Named for the chained princess of Greek myth, Andromeda is home to the Andromeda Galaxy (M31) — our nearest large galactic neighbour, visible to the naked eye on dark nights." },
  { latin:"Antlia", english:"Air Pump", brightest:"α Antliae", area:239, season:"spring", hemi:"S", desc:"A faint southern constellation introduced by Nicolas Louis de Lacaille in the 18th century. It represents the air pump he used in his experiments, and contains no stars brighter than magnitude 4." },
  { latin:"Apus", english:"Bird of Paradise", brightest:"α Apodis", area:206, season:"winter", hemi:"S", desc:"A small southern constellation representing the bird of paradise, introduced by Dutch navigators Keyser and de Houtman. It lies near the south celestial pole and is not visible from northern latitudes." },
  { latin:"Aquarius", english:"Water Bearer", brightest:"Sadalsuud", area:980, season:"autumn", hemi:"E", desc:"One of the oldest recognized constellations and a member of the zodiac, Aquarius depicts a figure pouring water. It contains the famous Helix Nebula, one of the closest planetary nebulae to Earth." },
  { latin:"Aquila", english:"Eagle", brightest:"Altair", area:652, season:"summer", hemi:"E", desc:"Aquila represents the eagle of Zeus in Greek mythology. Its brightest star, Altair, is one of the vertices of the Summer Triangle and spins so fast it bulges noticeably at its equator." },
  { latin:"Ara", english:"Altar", brightest:"α Arae", area:237, season:"summer", hemi:"S", desc:"Ara is a southern constellation representing the altar upon which the gods of Olympus swore allegiance before their battle with the Titans. It sits in a rich region of the Milky Way." },
  { latin:"Aries", english:"Ram", brightest:"Hamal", area:441, season:"autumn", hemi:"N", desc:"The first sign of the zodiac, Aries represents the ram whose golden fleece was sought by Jason and the Argonauts. Two thousand years ago, the vernal equinox was located within its boundaries." },
  { latin:"Auriga", english:"Charioteer", brightest:"Capella", area:657, season:"winter", hemi:"N", desc:"Auriga represents a charioteer holding goat kids. Its brilliant star Capella is the sixth brightest in the sky — a close pair of giant stars orbiting each other every 104 days." },
  { latin:"Boötes", english:"Herdsman", brightest:"Arcturus", area:907, season:"spring", hemi:"N", desc:"Boötes depicts a herdsman driving a bear across the sky. Arcturus, its alpha star, is the brightest in the northern celestial hemisphere and one of the closest giant stars to Earth at 37 light-years." },
  { latin:"Caelum", english:"Chisel", brightest:"α Caeli", area:125, season:"winter", hemi:"S", desc:"One of the faintest constellations in the sky, Caelum represents an engraving chisel. Introduced by Lacaille, it lies in a sparse region of sky and contains no objects of particular note." },
  { latin:"Camelopardalis", english:"Giraffe", brightest:"β Camelopardalis", area:757, season:"all", hemi:"N", desc:"A large but faint northern constellation representing a giraffe. Its unusual name combines the Greek words for camel and leopard — how ancient observers described the giraffe's spotted, long-necked form." },
  { latin:"Cancer", english:"Crab", brightest:"Altarf", area:506, season:"spring", hemi:"N", desc:"The faintest of the 12 zodiac constellations, Cancer contains the Beehive Cluster (M44) — one of the nearest and most prominent open clusters, visible to the naked eye as a hazy patch." },
  { latin:"Canes Venatici", english:"Hunting Dogs", brightest:"Cor Caroli", area:465, season:"spring", hemi:"N", desc:"Representing the hounds held by Boötes, this constellation is home to numerous bright galaxies including the Whirlpool Galaxy (M51) and the Sunflower Galaxy (M63), making it a treasure trove for observers." },
  { latin:"Canis Major", english:"Great Dog", brightest:"Sirius", area:380, season:"winter", hemi:"S", desc:"Canis Major is the larger of Orion's two hunting dogs. It contains Sirius — the Dog Star — which is the brightest star in the entire night sky at magnitude −1.46 and lies just 8.6 light-years away." },
  { latin:"Canis Minor", english:"Little Dog", brightest:"Procyon", area:183, season:"winter", hemi:"N", desc:"The smaller of Orion's two dogs, Canis Minor is dominated by Procyon, the eighth-brightest star in the sky. The name Procyon means 'before the dog', as it rises just before Sirius." },
  { latin:"Capricornus", english:"Sea Goat", brightest:"Deneb Algedi", area:414, season:"autumn", hemi:"S", desc:"One of the oldest zodiac constellations, Capricornus depicts a mythological sea goat — a creature with a goat's head and fish's tail. It is one of the faintest constellations of the zodiac." },
  { latin:"Carina", english:"Keel", brightest:"Canopus", area:494, season:"winter", hemi:"S", desc:"Carina was once part of the vast ship Argo Navis. It contains Canopus, the second-brightest star in the sky, and the spectacular Eta Carinae Nebula — a stellar nursery around an unstable hypergiant." },
  { latin:"Cassiopeia", english:"Queen of Ethiopia", brightest:"Schedar", area:598, season:"autumn", hemi:"N", desc:"One of the most recognizable northern constellations, Cassiopeia forms a distinctive 'W' or 'M' shape. In 1572 it hosted a brilliant supernova observed by Tycho Brahe, bright enough to be seen in daylight." },
  { latin:"Centaurus", english:"Centaur", brightest:"α Centauri", area:1060, season:"spring", hemi:"S", desc:"Home to Alpha Centauri, the closest star system to the Sun at just 4.37 light-years. The system includes Proxima Centauri, which holds the record as our single nearest stellar neighbour." },
  { latin:"Cepheus", english:"King of Ethiopia", brightest:"Alderamin", area:588, season:"autumn", hemi:"N", desc:"Named for the mythological king of Ethiopia, Cepheus is circumpolar from northern latitudes. It contains the Garnet Star (μ Cephei), one of the largest and reddest stars known, visible to the naked eye." },
  { latin:"Cetus", english:"Sea Monster", brightest:"Menkar / Diphda", area:1231, season:"autumn", hemi:"S", desc:"One of the largest constellations, Cetus represents the sea monster that threatened Andromeda. It contains Mira — the prototype long-period variable star — whose brightness changes dramatically over 332 days." },
  { latin:"Chamaeleon", english:"Chameleon", brightest:"α Chamaeleontis", area:132, season:"all", hemi:"S", desc:"A small southern constellation near the south celestial pole, Chamaeleon was introduced by 16th-century Dutch navigators. Its most notable feature is the Chamaeleon Cloud Complex, a region of active star formation." },
  { latin:"Circinus", english:"Drawing Compasses", brightest:"α Circini", area:93, season:"spring", hemi:"S", desc:"The second smallest constellation in the sky, Circinus represents a drawing compass. Despite its tiny size it hosts the Circinus Galaxy, one of the closest and most active Seyfert galaxies to the Milky Way." },
  { latin:"Columba", english:"Dove", brightest:"Phact", area:270, season:"winter", hemi:"S", desc:"Columba represents the dove that guided the Argonauts through the Clashing Rocks. It may also represent Noah's dove. The runaway star μ Columbae was likely ejected from the Orion Nebula about three million years ago." },
  { latin:"Coma Berenices", english:"Berenice's Hair", brightest:"β Comae Berenices", area:386, season:"spring", hemi:"N", desc:"Named for the hair of Egyptian queen Berenice II, this constellation contains the Coma Cluster — one of the richest galaxy clusters known — as well as the north galactic pole." },
  { latin:"Corona Australis", english:"Southern Crown", brightest:"α Coronae Australis", area:128, season:"summer", hemi:"S", desc:"The southern counterpart of Corona Borealis, this small arc of stars has been recognized as a crown or wreath since antiquity. It lies near the centre of the Milky Way and contains several star-forming nebulae." },
  { latin:"Corona Borealis", english:"Northern Crown", brightest:"Alphecca", area:179, season:"summer", hemi:"N", desc:"A small but distinctive semicircle of stars forming a crown or garland. In mythology it represents the crown given by Dionysus to Ariadne. The star T CrB is a recurrent nova expected to briefly blaze up to naked-eye visibility." },
  { latin:"Corvus", english:"Crow", brightest:"Gienah", area:184, season:"spring", hemi:"S", desc:"Corvus represents Apollo's sacred crow in Greek mythology. Its four brightest stars form a distinctive quadrilateral. Despite its modest size, it is relatively easy to identify due to the brightness contrast of its main stars." },
  { latin:"Crater", english:"Cup", brightest:"δ Crateris", area:282, season:"spring", hemi:"S", desc:"Crater represents the cup of Apollo and is associated with the nearby Corvus and Hydra constellations in an ancient mythological tableau. It is a faint constellation with no particularly bright stars." },
  { latin:"Crux", english:"Southern Cross", brightest:"Acrux", area:68, season:"autumn", hemi:"S", desc:"The smallest constellation by area, yet among the most famous. The Southern Cross has guided navigators for centuries and features on the flags of five nations. Its long axis points toward the south celestial pole." },
  { latin:"Cygnus", english:"Swan", brightest:"Deneb", area:804, season:"summer", hemi:"N", desc:"Cygnus depicts a swan flying along the Milky Way. Its brightest star Deneb marks the tail and is one of the most luminous stars known — if it were as close as Sirius, it would cast shadows at night." },
  { latin:"Delphinus", english:"Dolphin", brightest:"Rotanev", area:189, season:"summer", hemi:"N", desc:"A compact and distinctive constellation, Delphinus resembles a small diamond with a tail. Its two brightest stars, Sualocin and Rotanev, are the reversed Latin spelling of astronomer Nicolaus Venator, a clever historical joke." },
  { latin:"Dorado", english:"Swordfish", brightest:"α Doradus", area:179, season:"winter", hemi:"S", desc:"Dorado contains most of the Large Magellanic Cloud — our galaxy's most spectacular satellite galaxy — making it arguably the most scientifically important constellation despite its modest star pattern." },
  { latin:"Draco", english:"Dragon", brightest:"Eltanin", area:1083, season:"summer", hemi:"N", desc:"One of the largest northern constellations, Draco winds around the north celestial pole. Thuban, one of its stars, served as the pole star around 2700 BCE during the time of the ancient Egyptians." },
  { latin:"Equuleus", english:"Little Horse", brightest:"Kitalpha", area:72, season:"summer", hemi:"N", desc:"The second smallest constellation in the sky, Equuleus represents just the head of a small horse. It is one of the 48 constellations catalogued by Ptolemy but offers little of visual interest due to its faint stars." },
  { latin:"Eridanus", english:"River Po", brightest:"Achernar", area:1138, season:"winter", hemi:"S", desc:"The sixth largest constellation, Eridanus meanders across the sky representing a great river. Its brightest star Achernar, at the river's end, is one of the most oblate stars known, spinning so fast it is notably flattened." },
  { latin:"Fornax", english:"Furnace", brightest:"α Fornacis", area:398, season:"winter", hemi:"S", desc:"Introduced by Lacaille, Fornax represents a laboratory furnace. Despite its faint stars, it contains the Fornax Cluster — one of the closest galaxy clusters to the Milky Way, containing hundreds of galaxies." },
  { latin:"Gemini", english:"Twins", brightest:"Pollux", area:514, season:"winter", hemi:"N", desc:"One of the zodiac constellations, Gemini represents the twin heroes Castor and Pollux. Pollux is an orange giant and the closest giant star to the Sun. The Geminid meteor shower radiates from this constellation every December." },
  { latin:"Grus", english:"Crane", brightest:"Alnair", area:366, season:"autumn", hemi:"S", desc:"A southern constellation representing a crane, introduced by Dutch navigators. Grus contains several pairs of interacting galaxies sometimes called the 'Grus Quartet', providing spectacular views through a telescope." },
  { latin:"Hercules", english:"Hercules", brightest:"Kornephoros", area:1225, season:"summer", hemi:"N", desc:"One of the largest constellations, Hercules depicts the kneeling hero. It contains the great Hercules Cluster (M13) — the finest globular cluster visible from northern latitudes, containing roughly 300,000 stars." },
  { latin:"Horologium", english:"Pendulum Clock", brightest:"α Horologii", area:249, season:"winter", hemi:"S", desc:"Another of Lacaille's southern constellations, Horologium represents a pendulum clock. It contains the Horologium Supercluster — one of the largest structures in the observable universe, spanning 550 million light-years." },
  { latin:"Hydra", english:"Water Serpent", brightest:"Alphard", area:1303, season:"spring", hemi:"S", desc:"The largest constellation in the sky by area, Hydra stretches across more than 100 degrees of sky. It contains Alphard — 'the solitary one' — named for its isolation in an otherwise sparse region of sky." },
  { latin:"Hydrus", english:"Lesser Water Snake", brightest:"β Hydri", area:243, season:"all", hemi:"S", desc:"A small southern constellation representing a male water snake, introduced by Keyser and de Houtman. It lies between the Magellanic Clouds and its brightest star, Beta Hydri, is one of the closest stars visible to the naked eye." },
  { latin:"Indus", english:"Indian", brightest:"α Indi", area:294, season:"autumn", hemi:"S", desc:"Indus represents a figure of an indigenous American, introduced by Dutch navigators based on their travels. It contains Epsilon Indi, a nearby star system just 11.8 light-years away, with brown dwarf companions." },
  { latin:"Lacerta", english:"Lizard", brightest:"α Lacertae", area:201, season:"autumn", hemi:"N", desc:"A small northern constellation, Lacerta represents a lizard and lies in a rich area of the Milky Way. It gives its name to BL Lacertae objects — a type of active galactic nucleus with a jet pointing toward Earth." },
  { latin:"Leo", english:"Lion", brightest:"Regulus", area:947, season:"spring", hemi:"N", desc:"One of the most recognizable zodiac constellations, Leo features a distinctive sickle pattern forming the lion's head and mane. Regulus sits almost exactly on the ecliptic and marks the lion's heart." },
  { latin:"Leo Minor", english:"Little Lion", brightest:"Praecipua", area:232, season:"spring", hemi:"N", desc:"A small, faint constellation introduced by Johannes Hevelius in the 17th century, Leo Minor lies between Leo and Ursa Major. It has few objects of interest but its brightest star, Praecipua, is an orange giant." },
  { latin:"Lepus", english:"Hare", brightest:"Arneb", area:290, season:"winter", hemi:"S", desc:"Lepus represents a hare hunted by Orion, crouching at his feet. It contains the crimson star R Leporis (Hind's Crimson Star) — one of the reddest stars in the sky, a pulsating variable near the end of its life." },
  { latin:"Libra", english:"Balance", brightest:"Zubeneschamali", area:538, season:"summer", hemi:"S", desc:"The only zodiac constellation representing an inanimate object, Libra depicts scales of justice. Its two brightest stars, Zubenelgenubi and Zubeneschamali, mean 'southern claw' and 'northern claw' — remnants of when Libra was part of Scorpius." },
  { latin:"Lupus", english:"Wolf", brightest:"α Lupi", area:334, season:"spring", hemi:"S", desc:"An ancient constellation representing a wolf, Lupus lies in a rich part of the Milky Way between Centaurus and Scorpius. It was the site of SN 1006 — the brightest stellar event in recorded human history." },
  { latin:"Lynx", english:"Lynx", brightest:"α Lyncis", area:545, season:"winter", hemi:"N", desc:"Introduced by Hevelius, who reportedly named it Lynx because only the sharp-eyed could see it due to its faint stars. Despite its large area, it contains no stars brighter than magnitude 3.1." },
  { latin:"Lyra", english:"Harp", brightest:"Vega", area:286, season:"summer", hemi:"N", desc:"Small but brilliant, Lyra contains Vega — one of the brightest stars in the sky and a vertex of the Summer Triangle. The Ring Nebula (M57), a famous planetary nebula, lies between its two lower stars." },
  { latin:"Mensa", english:"Table Mountain", brightest:"α Mensae", area:153, season:"all", hemi:"S", desc:"Named after Table Mountain near Cape Town, where Lacaille made his observations. It is the only constellation named after a geographical feature on Earth, and contains part of the Large Magellanic Cloud." },
  { latin:"Microscopium", english:"Microscope", brightest:"γ Microscopii", area:210, season:"autumn", hemi:"S", desc:"One of the 14 constellations introduced by Lacaille to fill the southern sky with scientific instruments of his era. Microscopium is a faint, unremarkable constellation lying south of Capricornus." },
  { latin:"Monoceros", english:"Unicorn", brightest:"α Monocerotis", area:482, season:"winter", hemi:"S", desc:"Although faint, Monoceros lies in an extraordinarily rich region of the Milky Way. It contains the Rosette Nebula, the Christmas Tree Cluster, and the Hubble Variable Nebula — a stunning variety of deep-sky objects." },
  { latin:"Musca", english:"Fly", brightest:"α Muscae", area:138, season:"autumn", hemi:"S", desc:"A small southern constellation, Musca is one of the few remaining constellations from Bayer's Uranometria. It contains the Coalsack Nebula — a dark nebula silhouetted against the Milky Way — and several globular clusters." },
  { latin:"Norma", english:"Carpenter's Square", brightest:"γ² Normae", area:165, season:"summer", hemi:"S", desc:"Introduced by Lacaille, Norma represents a carpenter's set square. It lies in a brilliant part of the Milky Way and contains the Norma Cluster, one of the most massive galaxy clusters in the local universe." },
  { latin:"Octans", english:"Octant", brightest:"ν Octantis", area:291, season:"all", hemi:"S", desc:"Octans contains the south celestial pole, making it the southern equivalent of Ursa Minor. However, its pole star is a very dim naked-eye star, a stark contrast to the prominent Polaris in the north." },
  { latin:"Ophiuchus", english:"Serpent Bearer", brightest:"Rasalhague", area:948, season:"summer", hemi:"S", desc:"Often called the '13th zodiac sign' because the ecliptic passes through it, Ophiuchus depicts a man wrestling a serpent. It contains more globular clusters than any other constellation, including the bright M10 and M12." },
  { latin:"Orion", english:"Hunter", brightest:"Rigel", area:594, season:"winter", hemi:"E", desc:"Perhaps the most famous constellation, Orion's distinctive belt of three aligned stars is recognized worldwide. It contains the Great Orion Nebula (M42) — one of the closest stellar nurseries to Earth and a spectacular naked-eye object." },
  { latin:"Pavo", english:"Peacock", brightest:"Peacock", area:378, season:"autumn", hemi:"S", desc:"Representing a peacock, Pavo is a southern constellation introduced by Dutch navigators. Its brightest star, simply named Peacock, was selected as a navigation star for aviation and named by the British Air Ministry in 1937." },
  { latin:"Pegasus", english:"Winged Horse", brightest:"Enif", area:1121, season:"autumn", hemi:"N", desc:"Pegasus depicts the famous winged horse. The Great Square of Pegasus — four bright stars forming an unmistakable autumn landmark — was the site of the first discovery of an exoplanet around a Sun-like star in 1995." },
  { latin:"Perseus", english:"Hero Perseus", brightest:"Mirfak", area:615, season:"autumn", hemi:"N", desc:"Named for the mythological hero who slew Medusa, Perseus lies in a magnificent region of the Milky Way. Algol (the Demon Star) is a famous eclipsing binary, and the Perseid meteor shower originates here each August." },
  { latin:"Phoenix", english:"Phoenix", brightest:"Ankaa", area:469, season:"autumn", hemi:"S", desc:"Representing the mythological firebird that rises from its own ashes, Phoenix is a southern constellation introduced by Dutch navigators. It contains the Phoenix Cluster — home to the most powerful known black hole jet." },
  { latin:"Pictor", english:"Easel", brightest:"α Pictoris", area:247, season:"winter", hemi:"S", desc:"Introduced by Lacaille to represent an easel, Pictor is notable for its second-brightest star Beta Pictoris — a young star surrounded by a debris disc where planets are actively forming, a landmark discovery in exoplanet science." },
  { latin:"Pisces", english:"Fishes", brightest:"η Piscium", area:889, season:"autumn", hemi:"N", desc:"A zodiac constellation representing two fish tied together by their tails, Pisces contains the vernal equinox — the point where the Sun crosses the celestial equator northward each spring, currently located within its boundaries." },
  { latin:"Piscis Austrinus", english:"Southern Fish", brightest:"Fomalhaut", area:245, season:"autumn", hemi:"S", desc:"Piscis Austrinus is dominated by Fomalhaut, a bright star surrounded by a prominent dust ring — one of the first stars directly imaged with a candidate exoplanet. In mythology it drinks the water poured by Aquarius." },
  { latin:"Puppis", english:"Stern", brightest:"Naos", area:673, season:"winter", hemi:"S", desc:"Once part of the massive ship Argo Navis, Puppis represents the ship's stern. It contains the open cluster M47 and many other clusters in a rich Milky Way region. Naos (ζ Puppis) is one of the hottest naked-eye stars." },
  { latin:"Pyxis", english:"Mariner's Compass", brightest:"α Pyxidis", area:221, season:"spring", hemi:"S", desc:"Originally the compass of the Argo, Pyxis was separated from the larger Argo Navis constellation by Lacaille. It contains the recurring nova T Pyxidis, which periodically brightens by a factor of 10,000 or more." },
  { latin:"Reticulum", english:"Reticle / Net", brightest:"α Reticuli", area:114, season:"winter", hemi:"S", desc:"Introduced by Lacaille, Reticulum represents the crosshairs (reticle) of his telescope's eyepiece, used to measure star positions. It contains Zeta Reticuli — a system long associated in popular culture with UFO lore." },
  { latin:"Sagitta", english:"Arrow", brightest:"γ Sagittae", area:80, season:"summer", hemi:"N", desc:"Despite being one of the smallest constellations, Sagitta is quite recognizable as an arrow shape. It was known to the ancient Greeks. It contains the faint but rich globular cluster M71, once debated between cluster and nebula." },
  { latin:"Sagittarius", english:"Archer", brightest:"Kaus Australis", area:867, season:"summer", hemi:"S", desc:"The centre of the Milky Way galaxy lies in the direction of Sagittarius, making it one of the richest regions of sky. It contains more Messier objects than any other constellation, including prominent nebulae and star clusters." },
  { latin:"Scorpius", english:"Scorpion", brightest:"Antares", area:497, season:"summer", hemi:"S", desc:"One of the most striking constellations, Scorpius has a distinctive curved tail. Antares (meaning 'rival of Mars') is a red supergiant so large it would extend to the asteroid belt if placed at the Sun's position." },
  { latin:"Sculptor", english:"Sculptor's Workshop", brightest:"α Sculptoris", area:475, season:"autumn", hemi:"S", desc:"Introduced by Lacaille, Sculptor lies away from the Milky Way in a region called the Sculptor Void. It contains the Sculptor Galaxy (NGC 253) — one of the brightest and most detailed external galaxies visible." },
  { latin:"Scutum", english:"Shield", brightest:"α Scuti", area:109, season:"summer", hemi:"S", desc:"Scutum is a small constellation but lies in an incredibly rich part of the Milky Way. It contains the Wild Duck Cluster (M11) — one of the richest and most compact open clusters known, resembling a flock of wild ducks." },
  { latin:"Serpens", english:"Serpent", brightest:"Unukalhai", area:637, season:"summer", hemi:"E", desc:"Uniquely, Serpens is the only constellation divided into two separate parts: Serpens Caput (head) and Serpens Cauda (tail), split by Ophiuchus. It contains the Eagle Nebula (M16), home to the famous Pillars of Creation." },
  { latin:"Sextans", english:"Sextant", brightest:"α Sextantis", area:314, season:"spring", hemi:"E", desc:"Introduced by Hevelius to commemorate his sextant destroyed in a fire. Sextans is a very faint constellation lying south of Leo. It contains Sextans A and B — two dwarf irregular galaxies on the outskirts of the Local Group." },
  { latin:"Taurus", english:"Bull", brightest:"Aldebaran", area:797, season:"winter", hemi:"N", desc:"One of the oldest identified constellations, Taurus contains the Pleiades (M45) and Hyades open clusters, as well as the Crab Nebula (M1) — the remnant of the supernova observed by Chinese astronomers in 1054 CE." },
  { latin:"Telescopium", english:"Telescope", brightest:"α Telescopii", area:252, season:"summer", hemi:"S", desc:"Another of Lacaille's instrument constellations, Telescopium represents a refracting telescope. Its brightest star is only magnitude 3.5. It contains a famous pulsar, PSR B1937+21, the first millisecond pulsar discovered." },
  { latin:"Triangulum", english:"Triangle", brightest:"β Trianguli", area:132, season:"autumn", hemi:"N", desc:"One of the ancient constellations, Triangulum's three stars form a slender triangle. It contains the Triangulum Galaxy (M33) — the third-largest member of the Local Group and the most distant object visible to the naked eye." },
  { latin:"Triangulum Australe", english:"Southern Triangle", brightest:"Atria", area:110, season:"summer", hemi:"S", desc:"Despite being one of the smaller southern constellations, Triangulum Australe is distinctive due to its three relatively bright stars forming a clear triangle. It was introduced by Dutch navigators in the late 16th century." },
  { latin:"Tucana", english:"Toucan", brightest:"α Tucanae", area:295, season:"all", hemi:"S", desc:"Tucana is notable for containing both the Small Magellanic Cloud and the magnificent globular cluster 47 Tucanae — the second brightest globular cluster in the sky and a treasure trove for stellar astronomers." },
  { latin:"Ursa Major", english:"Great Bear", brightest:"Alioth", area:1280, season:"spring", hemi:"N", desc:"The third largest constellation, Ursa Major contains the Big Dipper asterism — one of the most universally recognized star patterns. Its seven main stars have been used for navigation across virtually every human culture." },
  { latin:"Ursa Minor", english:"Little Bear", brightest:"Polaris", area:256, season:"all", hemi:"N", desc:"Home to Polaris (the North Star), Ursa Minor has served as the north celestial pole marker for centuries, guiding navigators across oceans. Polaris currently sits within one degree of the true north pole." },
  { latin:"Vela", english:"Sails", brightest:"γ Velorum", area:500, season:"spring", hemi:"S", desc:"Once part of the great ship Argo Navis, Vela represents the sails. It contains the Vela Supernova Remnant — the expanding shell of a stellar explosion 11,000 years ago — and the hot, luminous runaway star γ Velorum." },
  { latin:"Virgo", english:"Virgin", brightest:"Spica", area:1294, season:"spring", hemi:"S", desc:"The largest of the zodiac constellations, Virgo contains the Virgo Cluster — the nearest large galaxy cluster with over 1,300 members — and Spica, one of the brightest stars in the sky, which helped Hipparchus discover the precession of equinoxes." },
  { latin:"Volans", english:"Flying Fish", brightest:"β Volantis", area:141, season:"winter", hemi:"S", desc:"A small southern constellation introduced by Dutch navigators, representing a flying fish. It lies near the Large Magellanic Cloud. Flying fish can genuinely glide above water — the constellation was inspired by fish the navigators saw in tropical seas." },
  { latin:"Vulpecula", english:"Fox", brightest:"α Vulpeculae", area:268, season:"summer", hemi:"N", desc:"A small constellation introduced by Hevelius, originally depicted as a fox carrying a goose. It contains the Dumbbell Nebula (M27) — the first planetary nebula ever discovered, and still one of the finest examples in the sky." }
];

const seasonColors = { spring:'season-spring', summer:'season-summer', autumn:'season-autumn', winter:'season-winter', all:'season-all' };
const seasonLabels = { spring:'Spring', summer:'Summer', autumn:'Autumn', winter:'Winter', all:'Year-round' };

let currentFilter = 'all';
let currentSort = 'alpha';
let currentSearch = '';

function render() {
  const grid = document.getElementById('ca-grid');
  const count = document.getElementById('ca-count');
  let list = DATA.slice();

  if (currentSearch.trim()) {
    const q = currentSearch.toLowerCase();
    list = list.filter(c =>
      c.latin.toLowerCase().includes(q) ||
      c.english.toLowerCase().includes(q) ||
      c.brightest.toLowerCase().includes(q) ||
      c.desc.toLowerCase().includes(q) ||
      c.hemi.toLowerCase().includes(q)
    );
  }
  if (currentFilter !== 'all') {
    list = list.filter(c => c.season === currentFilter);
  }
  if (currentSort === 'alpha') list.sort((a,b) => a.latin.localeCompare(b.latin));
  else if (currentSort === 'area-desc') list.sort((a,b) => b.area - a.area);
  else list.sort((a,b) => a.area - b.area);

  count.textContent = list.length + ' of ' + DATA.length;

  if (!list.length) {
    grid.innerHTML = '<div class="ca-empty">No constellations match your search.</div>';
    return;
  }

  grid.innerHTML = list.map(c => {
    const hemi = c.hemi === 'N' ? 'Northern' : c.hemi === 'S' ? 'Southern' : 'Both';
    return `<div class="ca-card">
      <div class="ca-card-head">
        <div class="ca-card-names">
          <div class="ca-latin">${c.latin}</div>
          <div class="ca-english">${c.english}</div>
        </div>
        <span class="ca-season-badge ${seasonColors[c.season]}">${seasonLabels[c.season]}</span>
      </div>
      <p class="ca-desc">${c.desc}</p>
      <div class="ca-meta">
        <span class="ca-chip"><i class="ti ti-star" aria-hidden="true"></i>${c.brightest}</span>
        <span class="ca-chip"><i class="ti ti-vector-triangle" aria-hidden="true"></i>${c.area} sq°</span>
        <span class="ca-chip"><i class="ti ti-world" aria-hidden="true"></i>${hemi}</span>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('ca-input').addEventListener('input', e => {
  currentSearch = e.target.value;
  render();
});

document.querySelectorAll('.ca-filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ca-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById('ca-sort-sel').addEventListener('change', e => {
  currentSort = e.target.value;
  render();
});

render();
</script>
